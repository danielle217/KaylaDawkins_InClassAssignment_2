<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whats the Animal?</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/main.js" defer></script>
</head>

<body>
    <header>
        <h1>Welcome to Whats the Animal?</h1>
        <h3>Click the buttons below to reveal the animal images.</h3>
    </header>

    <div class="animal_reveal">
        <div class="animal_card">
            <img id="cat" src="images/tabby-cat.jpg" alt="cat image" style="display: none;">
            <button id="hide_btn1" style="display: none;">Hide Results</button>
        </div>
        <div class="animal_card">
            <img id="dog" src="images/dog.jpg" alt="dog image" style="display: none;">
            <button id="hide_btn2" style="display: none;">Hide Results</button>
        </div>
        <div class="animal_card">
            <img id="cow" src="images/cow.jpg" alt="cow image" style="display: none;">
            <button id="hide_btn3" style="display: none;">Hide Results</button>
        </div>
    </div>

    <div class="animal_btns">
        <button id="btn1">Reveal a CAT</button>
        <button id="btn2">Reveal a DOG</button>
        <button id="btn3">Reveal a COW</button>
    </div>

    <div class="bottom_bar">
        <button class="reset" type="reset">Reset Zoo</button>
        <p>Animals on screen: <span id="count">0</span></p>
    </div>
</body>

</html>
